name: Build and Deploy Flow AI Worker

on:
  push:
    paths:
      - 'src/lib/queue-worker.ts'
      - 'Dockerfile.queue'
      - '.github/workflows/deploy-flow-ai-worker.yml'
      - 'src/lib/redis-rate-limit.ts'
      - 'src/lib/pdf-parser.ts'
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/flow-ai-worker
  CONTAINER_APP_NAME: flow-ai-worker
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/metadata-action@v4
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            latest
      
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.queue
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy
        run: |
          # Fetch the latest container app config
          az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --output json > app.json
          
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          
          # Inject new image and health probes using Python
          python3 -c "
          import json, sys
          with open('app.json', 'r') as f:
              data = json.load(f)
          data['properties']['template']['containers'][0]['image'] = sys.argv[1]
          data['properties']['template']['containers'][0]['probes'] = [
              {'type': 'liveness', 'httpGet': {'path': '/health', 'port': 8080}, 'initialDelaySeconds': 15, 'periodSeconds': 30, 'timeoutSeconds': 5, 'failureThreshold': 3},
              {'type': 'readiness', 'httpGet': {'path': '/health', 'port': 8080}, 'initialDelaySeconds': 5, 'periodSeconds': 10, 'timeoutSeconds': 5, 'failureThreshold': 3, 'successThreshold': 1},
              {'type': 'startup', 'httpGet': {'path': '/health', 'port': 8080}, 'initialDelaySeconds': 5, 'periodSeconds': 10, 'timeoutSeconds': 5, 'failureThreshold': 30}
          ]
          with open('updated_app.json', 'w') as f:
              json.dump(data, f)
          " "$NEW_IMAGE"
          
          # Apply the updated configuration
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yaml updated_app.json
